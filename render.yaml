# Render Blueprint — ClientPulse AI (Postgres + FastAPI backend + Vite static frontend)
# Deploy: Render Dashboard > New > Blueprint > pick this repo.
# Secrets (sync:false) are prompted once on first create — never commit real values.
#
# One-time after first deploy (from your laptop, against the DB's EXTERNAL url):
#   psql "<external-db-url>" -f backend/schema.sql
#   DATABASE_URL="<external-db-url>" OPENAI_API_KEY=... uv run --project backend python -m src.seed --accounts 30
#   DATABASE_URL="<external-db-url>" OPENAI_API_KEY=... uv run --project backend python -m src.seed_docs --accounts 30
# Then paste the resulting vector-store id into the OPENAI_VECTOR_STORE_ID env var.

databases:
  - name: clientpulse-db
    plan: free
    databaseName: clientpulse
    user: clientpulse
    region: oregon

services:
  # ---- Backend: FastAPI (uv) --------------------------------------------
  - type: web
    runtime: python
    name: clientpulse-api
    rootDir: ./backend
    region: oregon
    plan: free
    buildCommand: pip install uv && uv sync --frozen && uv cache prune --ci
    startCommand: uv run uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clientpulse-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13"
      - key: OPENAI_MODEL
        value: gpt-5
      - key: OPENAI_MODEL_MINI
        value: gpt-5-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VECTOR_STORE_ID
        sync: false
      # Bare host from fromService (no scheme); backend normalizes to https://.
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: clientpulse-web
          property: host

  # ---- Frontend: React + Vite (static) ----------------------------------
  - type: web
    runtime: static
    name: clientpulse-web
    rootDir: ./frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # Bare host from fromService (no scheme); frontend normalizes to https://.
      # VITE_API_URL is inlined at BUILD time — a backend URL change needs a rebuild.
      - key: VITE_API_URL
        fromService:
          type: web
          name: clientpulse-api
          property: host
